<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14171F"/>
      <stop offset="50%" stop-color="#0A0C10"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DF1E26"/>
      <stop offset="50%" stop-color="#C5A880"/>
      <stop offset="100%" stop-color="#E2C499"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#C5A880" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C5A880" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="260" fill="url(#glow)"/>
  
  <!-- Border -->
  <rect x="20" y="20" width="760" height="560" rx="20" fill="none" stroke="#222733" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="560" rx="20" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Logo Image from /logo.png -->
  <image href="/logo.png" x="220" y="130" width="360" height="200" preserveAspectRatio="xMidYMid meet"/>

  <!-- Text -->
  <text x="400" y="380" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" text-anchor="middle" letter-spacing="8">DA!CAR</text>
  <text x="400" y="418" fill="#C5A880" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">СКАЖИ «ДА!» СВОЕЙ МЕЧТЕ!</text>
  <line x1="320" y1="445" x2="480" y2="445" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <text x="400" y="480" fill="#717A8A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="2">ОЖИДАЕТСЯ ЗАГРУЗКА ФОТОГРАФИЙ</text>
</svg>
